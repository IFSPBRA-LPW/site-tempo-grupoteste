<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/estilo.css">
    <title>Tempo</title>
</head>
<body>
    <header>
        <div><img src="" alt=""><p>Weather Now</p></div>
        <button><i class="fa-solid fa-gear"></i>Units</button>
    </header>
    <main>
        <div id="containerTituloPrincipal">
            <h1 id="tituloPrincipal">How's the sky looking today?</h1>
        </div>
        
        <section>
            <form action="" class="search">
                <input type="search" id="busca" name="q" placeholder="Digite sua pesquisa..." required>
                <button type="submit" class="submitPesquisar">Pesquisar</button>
            </form>
        </section>

        <div class="principal">
           <div class="esquerda">
                <section class="weather-header">
                    <div>
                        <h3>Berlin, Germany</h3>
                        <p>Tuesday, Aug 5, 2025</p>
                    </div>
                    <div>
                        <p>20°</p>
                    </div>
                </section>
                <section class="weather">
                    <ul >
                        <li class="weatherCard">
                            <p>Feels Like</p>
                            <p>18°</p>
                        </li>
                        <li class="weatherCard">
                            <p>Wind 20km/h</p>
                        </li>
                        <li class="weatherCard">
                            <p>Wind 22km/h</p>
                        </li>
                        <li class="weatherCard">
                            <p>Preciptation 0mm</p>
                        </li>
                    </ul>
                
                </section>

                <section>
                    <ul class="dailyForecast">
                        <li class="dailyForecastCard">Tue</li>
                        <li class="dailyForecastCard">Wed</li>
                        <li class="dailyForecastCard"></li>
                        <li class="dailyForecastCard"></li>
                        <li class="dailyForecastCard"></li>
                        <li class="dailyForecastCard"></li>
                        <li class="dailyForecastCard"></li>
                    </ul>
                </section>

           </div>

           <div class="direita">
                <section class="hourlyForecast">
                    <div class="hourlyForecastTop">
                        <p>Hourly forecast</p>
                        <button>Tuesday</button>

                    </div>
                    
                    <ul>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                    </ul>
                </section>
           </div>
        </div>
    </main>
</body>
</html>
