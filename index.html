<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="/scripts/index.js" defer></script>
    <link rel="stylesheet" href="/styles/estilo.css">
    <title>Tempo</title>
</head>
<body>
    <header>
        <div><img src="" alt=""><p>Weather Now</p></div>
        <button><i class="fa-solid fa-gear"></i>Units</button>
    </header>
    <main>
        <div id="containerTituloPrincipal">
            <h1 id="tituloPrincipal">How's the sky looking today?</h1>
        </div>
        
        <section>
            <form action="" class="search">
                <input type="search" id="busca" name="q" placeholder="Digite sua pesquisa..." required>
                <button type="submit" class="submitPesquisar">Pesquisar</button>
            </form>
        </section>

        <div class="principal">
           <div class="esquerda">
                <section class="weather-header">
                    <div>
                        <h3 class="nameCity"></h3>
                        <p class="date"></p>
                    </div>
                    <div>
                        <p class="temperature"></p>
                    </div>
                </section>
                <section class="weather">
                    <ul >
                        <li class="weatherCard">
                            <p>Feels Like</p>
                            <p class="weatherCard_Temperature"></p>
                        </li>
                        <li class="weatherCard">
                            <p>Humidity</p>
                            <p class="weatherCard_Humidity"></p>
                        </li>
                        <li class="weatherCard">
                            <p>Wind</p>
                            <p class="weatherCard_Wind"></p>
                        </li>
                        <li class="weatherCard">
                            <p>Preciptation</p>
                            <p class="weatherCard_Precipitation"></p>
                        </li>
                    </ul>
                
                </section>

                <section>
                    <ul class="daily">
                        <li class="dailyCard">
                        </li>
                        <li class="dailyCard">
                            
                        </li>
                        <li class="dailyCard">
                        </li>
                        <li class="dailyCard">
                            

                        </li>
                        <li class="dailyCard">
                            
                        </li>
                        <li class="dailyCard">
                            
                        </li>
                        <li class="dailyCard">
                            
                        </li>
                    </ul>
                </section>

           </div>

           <div class="direita">
                <section class="hourly">
                    <div class="hourlyTop">
                        <p>Hourly forecast</p>
                        <button>Tuesday</button>

                    </div>
                    
                    <ul>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                    </ul>
                </section>
           </div>
        </div>
    </main>
</body>
</html>
